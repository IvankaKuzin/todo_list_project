{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>
    Tag List
    <a href="{% url 'elements:tag-create' %}" class="btn btn-primary link-to-page">
      Create
    </a>
  </h1>

  {% if tag_list %}
    <table class="table">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>

      {% for tag in tag_list %}
        <tr>
          <td>
            {{ tag.id }}
          </td>
          <td>
            {{ tag.name }}
          </td>
          <td>
            <a href="{% url 'elements:tag-update' pk=tag.id %}" class="btn btn-secondary btn-sm">
              Update
            </a>
          </td>
          <td>
            <a
               href="{% url 'elements:tag-delete' pk=tag.id %}" class="btn btn-danger btn-sm">
              Delete
            </a>
          </td>
        </tr>
      {% endfor %}
    </table>
  {% endif %}
{% endblock %}
